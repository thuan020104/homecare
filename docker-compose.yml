version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: dacnpm-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - dacnpm-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dacnpm-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://admin:password@mongodb:27017/manager-btaskee?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-sk_prod_dacnpm_app_2024_secure_key_minimum_32_characters_long_abc123xyz}
      MOMO_PARTNER_CODE: MOMO
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-F8BBA842ECF85}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-K951B6PE1waDMi640xX08PD3vg6EkVlz}
      MOMO_REDIRECT_URL: http://localhost:5173/orders-success
      MOMO_IPN_URL: http://localhost:5000/api/momo/callback
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - dacnpm-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  # Frontend UI
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: dacnpm-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - dacnpm-network
    volumes:
      - ./client:/app
      - /app/node_modules
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: dacnpm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dacnpm-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  dacnpm-network:
    driver: bridge
