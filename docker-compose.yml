version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: dacnpm-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - dacnpm-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dacnpm-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://admin:password123@mongodb:27017/manager-btaskee?authSource=admin
      JWT_SECRET: sk_dev_dacnpm_2024_test_key_min_32_characters_abc123
      MOMO_PARTNER_CODE: MOMO
      MOMO_ACCESS_KEY: F8BBA842ECF85
      MOMO_SECRET_KEY: K951B6PE1waDMi640xX08PD3vg6EkVlz
      MOMO_REDIRECT_URL: http://localhost:5173/orders-success
      MOMO_IPN_URL: http://localhost:5000/api/momo/callback
      NODE_ENV: development
    depends_on:
      - mongodb
    networks:
      - dacnpm-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  # Frontend UI
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: dacnpm-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - dacnpm-network
    volumes:
      - ./client:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  dacnpm-network:
    driver: bridge
